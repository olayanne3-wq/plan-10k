// UTILS

function today() { return new Date().toISOString().slice(0,10); }
function countdown() { return Math.ceil((new Date("2026-09-06") - new Date()) / 86400000); }
function currentWeek() {
  const t = today();
  for (const w of PLAN) {
    if (t >= w.sessions[0].date && t <= w.sessions[6].date) return w.week;
  }
  return t < PLAN[0].sessions[0].date ? 1 : 11;
}
function fmtDate(d) { return new Date(d+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"}); }
function fmtPace(speedMs) {
  if (!speedMs || speedMs <= 0) return "--:--";
  const secPerKm = 1000 / speedMs;
  const min = Math.floor(secPerKm / 60);
  const sec = Math.round(secPerKm % 60).toString().padStart(2,"0");
  return `${min}:${sec}`;
}
function fmtTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.round(seconds % 60).toString().padStart(2,"0");
  return `${m}'${s}"`;
}
function weekPct(week) {
  const sess = week.sessions.filter(s=>s.type!=="REPOS"&&s.type!=="RACE");
  const done = sess.filter(s=>statuses[`${week.week}-${week.sessions.indexOf(s)}`]==="✅").length;
  return sess.length ? Math.round(done/sess.length*100) : 0;
}
function globalPct() {
  const total = ALL_SESSIONS.filter(s=>s.type!=="REPOS"&&s.type!=="RACE").length;
  const done = ALL_SESSIONS.filter(s=>statuses[s.uid]==="✅").length;
  return Math.round(done/total*100);
}
function phaseOf(weekNum) { return PHASES.find(p=>p.weeks.includes(weekNum))||{color:"#64748b",label:""}; }

// PRÉDICTION 10K — v2
// ══════════════════════════════════════════════════════════════════════════════
const EFFORT_PACE_THRESHOLD = 5.5 * 60;

function getEffortLaps(activity) {
  if (!activity.laps || activity.laps.length === 0) return [];
  return activity.laps.filter(lap => {
    if (!lap.average_speed || lap.average_speed <= 0) return false;
    const secPerKm = 1000 / lap.average_speed;
    return secPerKm < EFFORT_PACE_THRESHOLD && lap.distance >= 200;
  });
}

function predict10K() {
  const BASE_TIME = 3021;
  const BASE_DATE = new Date("2026-06-07");
  const RACE_DATE = new Date("2026-09-06");
  const TOTAL_DAYS = (RACE_DATE - BASE_DATE) / 86400000;

  const runs = stravaActivities.filter(a => a.type === "Run" && a.distance >= 1000);
  let estimates = [];
  let details = [];

  // 1. Riegel sur sorties longues EF ≥ 8 km
  const longRuns = runs.filter(r => {
    const dateLocal = r.start_date_local?.slice(0,10);
    return r.distance >= 8000 && !INTERVAL_SESSION_DATES.has(dateLocal);
  });
  if (longRuns.length > 0) {
    const bestLong = longRuns.reduce((best,r) =>
      (r.moving_time/r.distance) < (best.moving_time/best.distance) ? r : best, longRuns[0]);
    const riegelLong = bestLong.moving_time * Math.pow(10000/bestLong.distance, 1.06);
    estimates.push({ value: riegelLong, weight: 0.25 });
    details.push({ label:"Riegel longue "+(bestLong.distance/1000).toFixed(1)+"km", value:fmtTime(Math.round(riegelLong)) });
  }

  // 2. Riegel sur laps d'effort SPEC
  const specRuns = runs.filter(r => {
    const dateLocal = r.start_date_local?.slice(0,10);
    return ALL_SESSIONS.find(s => s.date===dateLocal && s.type==="SPEC");
  });
  const specLaps = specRuns.flatMap(r => getEffortLaps(r));
  if (specLaps.length > 0) {
    const avgSpecSpeed = specLaps.reduce((s,l)=>s+l.average_speed,0)/specLaps.length;
    const avgLapDist = specLaps.reduce((s,l)=>s+l.distance,0)/specLaps.length;
    const avgLapTime = avgLapDist/avgSpecSpeed;
    const riegelSpec = avgLapTime * Math.pow(10000/avgLapDist, 1.06);
    estimates.push({ value: riegelSpec, weight: 0.45 });
    details.push({ label:`Allure moy. SPEC (${specLaps.length} intervalles)`, value:fmtPace(avgSpecSpeed)+"/km" });
    details.push({ label:"→ Riegel SPEC", value:fmtTime(Math.round(riegelSpec)) });
  }

  // 3. VMA → 10K via laps d'effort
  const vmaRuns = runs.filter(r => {
    const dateLocal = r.start_date_local?.slice(0,10);
    return ALL_SESSIONS.find(s => s.date===dateLocal && s.type==="VMA");
  });
  const vmaLaps = vmaRuns.flatMap(r => getEffortLaps(r));
  if (vmaLaps.length > 0) {
    const avgVmaSpeed = vmaLaps.reduce((s,l)=>s+l.average_speed,0)/vmaLaps.length;
    const pace10kFromVma = avgVmaSpeed * 0.87;
    const time10kFromVma = 10000/pace10kFromVma;
    estimates.push({ value: time10kFromVma, weight: 0.30 });
    details.push({ label:`VMA moy. (${vmaLaps.length} intervalles)`, value:fmtPace(avgVmaSpeed)+"/km" });
    details.push({ label:"→ 10K estimé (×0.87)", value:fmtTime(Math.round(time10kFromVma)) });
  }

  let estimate = BASE_TIME;
  let confidence = 30;
  let method = "Base Lavandou 50'21\"";

  if (estimates.length > 0) {
    const totalWeight = estimates.reduce((s,e)=>s+e.weight,0);
    const weighted = estimates.reduce((s,e)=>s+e.value*e.weight,0)/totalWeight;
    const today_ = new Date();
    const daysIn = Math.max(0,(today_-BASE_DATE)/86400000);
    const progressFactor = Math.min(daysIn/TOTAL_DAYS,1);
    estimate = BASE_TIME*(1-progressFactor) + weighted*progressFactor;
    confidence = Math.min(30+runs.length*4+specLaps.length*8+vmaLaps.length*5,95);
    method = estimates.length===1?"1 source":""+estimates.length+" sources combinées";
  }

  const target = 48.5*60;
  const gap = estimate-target;
  return {
    time: Math.round(estimate), timeStr: fmtTime(Math.round(estimate)),
    target: fmtTime(target), gap: Math.round(gap),
    gapStr: (gap>0?"+":"")+fmtTime(Math.abs(Math.round(gap))),
    onTrack: gap<=30, confidence, method, details,
  };
}

function getBackupData() {
  return JSON.stringify({statuses, notesList, version:1, savedAt:new Date().toISOString()});
}
let gistSaveTimer = null;

async function gistSave(silent=false) {
  if (!githubToken) return;
  try {
    const body = {description:"Plan 10K Laurent — backup", public:false,
      files:{"plan10k_backup.json":{content:getBackupData()}}};
    let url="https://api.github.com/gists", method="POST";
    if (gistId) { url+="/"+gistId; method="PATCH"; }
    const resp = await fetch(url,{method,headers:{"Authorization":"token "+githubToken,"Content-Type":"application/json"},body:JSON.stringify(body)});
    if (!resp.ok) throw new Error(resp.status);
    const data = await resp.json();
    gistId = data.id; save("lk_gist_id",gistId);
    if (!silent) { gistMsg="☁️ Sauvegardé "+new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}); render(); setTimeout(()=>{gistMsg="";render();},3000); }
  } catch(e) {
    if (!silent) { gistMsg="❌ Erreur sync"; render(); setTimeout(()=>{gistMsg="";render();},3000); }
  }
}

function scheduleSave() {
  if (!githubToken) return;
  if (gistSaveTimer) clearTimeout(gistSaveTimer);
  gistSaveTimer = setTimeout(()=>gistSave(true),2000);
}

async function gistLoad() {
  if (!githubToken||!gistId) return;
  try {
    const resp = await fetch("https://api.github.com/gists/"+gistId,{headers:{"Authorization":"token "+githubToken}});
    if (!resp.ok) throw new Error();
    const data = await resp.json();
    const raw = data.files["plan10k_backup.json"]?.content;
    if (!raw) return;
    const parsed = JSON.parse(raw);
    if (Object.keys(statuses).length===0&&notesList.length===0) {
      statuses=parsed.statuses||{}; notesList=parsed.notesList||[];
      save("lk_statuses",statuses); save("lk_notes",notesList);
      gistMsg="☁️ Données restaurées"; render(); setTimeout(()=>{gistMsg="";render();},4000);
    }
  } catch(e) {}
}

async function gistForceRestore() {
  if (!githubToken||!gistId) { gistMsg="❌ Pas de sauvegarde"; render(); setTimeout(()=>{gistMsg="";render();},3000); return; }
  try {
    const resp = await fetch("https://api.github.com/gists/"+gistId,{headers:{"Authorization":"token "+githubToken}});
    if (!resp.ok) throw new Error();
    const data = await resp.json();
    const raw = data.files["plan10k_backup.json"]?.content;
    if (!raw) throw new Error();
    const parsed = JSON.parse(raw);
    statuses=parsed.statuses||{}; notesList=parsed.notesList||[];
    save("lk_statuses",statuses); save("lk_notes",notesList);
    gistMsg="✅ Restauré · "+(parsed.savedAt?new Date(parsed.savedAt).toLocaleDateString("fr-FR"):"");
    render(); setTimeout(()=>{gistMsg="";render();},4000);
  } catch(e) { gistMsg="❌ Erreur restauration"; render(); setTimeout(()=>{gistMsg="";render();},3000); }
}

if (githubToken&&gistId) { gistLoad(); }

async function ensureFreshToken() {
  if (!stravaToken) return false;
  if (Date.now()/1000 < stravaExpires-60) return true;
  try {
    const resp = await fetch("/api/strava/refresh",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({refresh_token:stravaRefresh})});
    const data = await resp.json();
    stravaToken=data.access_token; stravaRefresh=data.refresh_token; stravaExpires=data.expires_at;
    save("lk_strava_token",stravaToken); save("lk_strava_refresh",stravaRefresh); save("lk_strava_expires",stravaExpires);
    return true;
  } catch { return false; }
}

async function syncStrava() {
  syncing=true; syncMsg="Connexion à Strava..."; render();
  const ok = await ensureFreshToken();
  if (!ok) { syncing=false; syncMsg="Erreur de token"; render(); return; }
  try {
    syncMsg="Récupération des activités..."; render();
    const resp = await fetch(`/api/strava/activities?token=${stravaToken}`);
    const activities = await resp.json();
    if (Array.isArray(activities)) {
      stravaActivities=activities; save("lk_strava_activities",activities);
      matchActivitiesToPlan(activities);
      syncMsg=`✅ ${activities.length} activité${activities.length>1?"s":""} synchronisée${activities.length>1?"s":""}`;
    } else { syncMsg="❌ Erreur Strava"; }
  } catch(e) { syncMsg="❌ Erreur réseau"; }
  syncing=false; render();
  setTimeout(()=>{ syncMsg=""; render(); },3000);
}

// Extraire la durée cible en minutes depuis le champ session
function parseTargetMinutes(session) {
  const m = session.match(/(\d+)(?:–|-)(\d+)\s*min|^(\d+)\s*min/);
  if (!m) return null;
  return m[3] ? parseInt(m[3]) : (parseInt(m[1]) + parseInt(m[2])) / 2;
}

// Extraire le nombre de répétitions prévu depuis le champ session
function parseTargetReps(session) {
  const m = session.match(/^(\d+)×/);
  return m ? parseInt(m[1]) : null;
}

function autoValidate(session, stravaRun) {
  if (!stravaRun) return null;
  const type = session.type;
  const effortLaps = getEffortLaps(stravaRun);

  if (type === "EF" || type === "LONGUE") {
    const targetMin = parseTargetMinutes(session.session);
    if (!targetMin) return "✅";
    const actualMin = stravaRun.moving_time / 60;
    const ratio = actualMin / targetMin;
    // Allure réelle en sec/km
    const actualPace = stravaRun.average_speed > 0 ? 1000 / stravaRun.average_speed : 999;
    const inPace = actualPace >= 340 && actualPace <= 420; // 5:40–7:00/km
    if (ratio >= 0.90 && inPace) return "✅";
    if (ratio >= 0.70) return "⚠️";
    return "❌";
  }

  if (type === "SPEC" || type === "TEST") {
    if (effortLaps.length === 0) {
      // Pas de laps → valider sur durée totale approximative
      return stravaRun.moving_time > 1200 ? "✅" : "⚠️";
    }
    const avgPace = effortLaps.reduce((s,l)=>s+1000/l.average_speed,0)/effortLaps.length;
    const targetReps = parseTargetReps(session.session);
    const repRatio = targetReps ? effortLaps.length / targetReps : 1;
    if (avgPace <= 301 && repRatio >= 0.80) return "✅";  // ≤ 5:01/km
    if (avgPace <= 310 && repRatio >= 0.60) return "⚠️";  // ≤ 5:10/km
    return "❌";
  }

  if (type === "VMA") {
    if (effortLaps.length === 0) return "⚠️";
    const avgPace = effortLaps.reduce((s,l)=>s+1000/l.average_speed,0)/effortLaps.length;
    const targetReps = parseTargetReps(session.session);
    const repRatio = targetReps ? effortLaps.length / targetReps : 1;
    if (avgPace <= 270 && repRatio >= 0.80) return "✅";  // ≤ 4:30/km
    if (avgPace <= 290 && repRatio >= 0.60) return "⚠️";  // ≤ 4:50/km
    return "❌";
  }

  if (type === "SEUIL") {
    if (effortLaps.length === 0) {
      // Pas de laps → allure moyenne totale
      const pace = stravaRun.average_speed > 0 ? 1000/stravaRun.average_speed : 999;
      if (pace <= 310) return "✅";
      if (pace <= 330) return "⚠️";
      return "❌";
    }
    const avgPace = effortLaps.reduce((s,l)=>s+1000/l.average_speed,0)/effortLaps.length;
    if (avgPace <= 305) return "✅";   // ≤ 5:05/km
    if (avgPace <= 320) return "⚠️";  // ≤ 5:20/km
    return "❌";
  }

  return "✅";
}

function matchActivitiesToPlan(activities) {
  const runs = activities.filter(a=>a.type==="Run");
  ALL_SESSIONS.forEach(s => {
    if (s.type==="REPOS"||s.type==="RACE") return;
    const match = runs.find(r=>r.start_date_local?.slice(0,10)===s.date);
    if (match) {
      if (!statuses[s.uid] || statuses[s.uid]==="—") {
        // Auto-validation uniquement si pas de statut manuel
        const auto = autoValidate(s, match);
        if (auto) statuses[s.uid] = auto;
      }
    }
  });
  save("lk_statuses",statuses);
}

// DOM HELPERS
// ══════════════════════════════════════════════════════════════════════════════
function el(tag,attrs,...children) {
  const e=document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v])=>{
    if (k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else if (k==="class") e.className=v;
    else e.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if (c==null||c===false) return;
    e.appendChild(typeof c==="string"?document.createTextNode(c):c);
  });
  return e;
}

function svgCircle(pct,size,stroke,color,inner) {
  const r2=(size-stroke)/2, circ=2*Math.PI*r2;
  const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("width",size); svg.setAttribute("height",size);
  svg.style.transform="rotate(-90deg)";
  const mk=(clr,dash,off)=>{
    const c=document.createElementNS("http://www.w3.org/2000/svg","circle");
    c.setAttribute("cx",size/2);c.setAttribute("cy",size/2);c.setAttribute("r",r2);
    c.setAttribute("fill","none");c.setAttribute("stroke",clr);c.setAttribute("stroke-width",stroke);
    if(dash){c.setAttribute("stroke-dasharray",circ);c.setAttribute("stroke-dashoffset",off);c.setAttribute("stroke-linecap","round");}
    return c;
  };
  svg.appendChild(mk("#232738",false));
  svg.appendChild(mk(color,true,circ-(pct/100)*circ));
  const wrap=el("div",{style:{position:"relative",width:size+"px",height:size+"px",flexShrink:"0"}});
  wrap.appendChild(svg);
  const center=el("div",{style:{position:"absolute",inset:"0",display:"flex",alignItems:"center",justifyContent:"center"}},inner);
  wrap.appendChild(center);
  return wrap;
}

function badge(type) {
  const st=STYPES[type]||{color:"#64748b",short:type};
  return el("span",{class:"pill",style:{background:st.color+"22",color:st.color,border:`1px solid ${st.color}44`}},st.short);
}

  const stravaSection=el("div",{style:{marginBottom:"16px",display:"flex",alignItems:"center",justifyContent:"space-between"}},

          el("span",{class:"muted",style:{fontSize:"12px"}},

          )
        )
      : el("span",{class:"muted",style:{fontSize:"12px"}},"Strava non connecté"),
    el("button",{
      style:{background:"none",border:"none",color:"#64748b",fontSize:"12px",cursor:"pointer",padding:"0",textDecoration:"underline"},
      onClick:()=>{ if(stravaToken&&!syncing){ syncStrava(); } else { setView("settings"); } }
    }, stravaToken&&!syncing ? "🔄 Sync" : "Paramètres")
  );

  let todayEl=null;
  if (todaySessions.length) {
    todayEl=el("div",{style:{marginBottom:"16px"}},
      el("div",{class:"label"},"Aujourd'hui"),
      ...todaySessions.map(s=>{
        const b=el("button",{style:{width:"100%",background:"#1a1d27",border:"1px solid #f9731655",borderLeft:"3px solid #f97316",borderRadius:"10px",padding:"12px 14px",textAlign:"left",cursor:"pointer",display:"flex",alignItems:"center",gap:"12px",marginBottom:"8px"}},
          badge(s.type),
          el("div",{style:{flex:"1"}},
            el("div",{style:{color:"#f1f5f9",fontSize:"14px",fontWeight:"600"}},s.session),
            s.notes?el("div",{class:"muted",style:{fontSize:"12px",marginTop:"2px"}},s.notes):null
          ),
          el("div",{style:{color:"#f97316",fontSize:"18px"}},"›")
        );
        b.addEventListener("click",()=>{ selectedWeek=s.week; setView("weekDetail"); });
        return b;
      })
    );
  }

  const stats=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"16px"}},
    ...[["Complétées",done,"#22c55e"],["Manquées",missed,"#ef4444"],["Adaptées",adapted,"#eab308"],["Restantes",total-done-missed-adapted,"#94a3b8"]]
    .map(([label,val,color])=>el("div",{class:"card"},
      el("div",{style:{color,fontSize:"24px",fontWeight:"800"}},val+""),
      el("div",{class:"muted",style:{fontSize:"11px"}},label)
    ))
  );

  const phases=el("div",{},
    el("div",{class:"label"},"Phases"),
    ...PHASES.map(ph=>{
      const ws=ALL_SESSIONS.filter(s=>ph.weeks.includes(s.week)&&s.type!=="REPOS"&&s.type!=="RACE");
      const dn=ws.filter(s=>statuses[s.uid]==="✅").length;
      const pct=ws.length?Math.round(dn/ws.length*100):0;
      const b=el("button",{style:{width:"100%",background:"#1a1d27",border:"1px solid #2e3347",borderRadius:"10px",padding:"12px 14px",marginBottom:"8px",textAlign:"left",cursor:"pointer",display:"flex",alignItems:"center",gap:"14px"}},

        el("div",{style:{flex:"1"}},
          el("div",{style:{color:"#f1f5f9",fontSize:"14px",fontWeight:"700"}},ph.label),
          el("div",{class:"muted",style:{fontSize:"12px"}},"Sem. "+ph.weeks[0]+"–"+ph.weeks[ph.weeks.length-1]+" · "+dn+"/"+ws.length+" séances")
        ),
        el("div",{class:"muted",style:{fontSize:"18px"}},"›")
      );
      b.addEventListener("click",()=>{ selectedWeek=ph.weeks[0]; setView("weekDetail"); });
      return b;
    })
  );

  return el("div",{style:{padding:"0 16px 100px"}},hero,predCard,stravaSection,todayEl||"",stats,phases);
}

const SOPTS=["—","✅","❌","⚠️","😴"];
const SCOLORS={"—":"#475569","✅":"#22c55e","❌":"#ef4444","⚠️":"#eab308","😴":"#60a5fa"};

function renderWeekDetail(weekNum) {
  const week=PLAN.find(w=>w.week===weekNum);
  if (!week) return el("div",{},"—");
  const t=today();
  const weekDates=week.sessions.map(s=>s.date);
  const weekRuns=stravaActivities.filter(a=>a.type==="Run"&&weekDates.includes(a.start_date_local?.slice(0,10)));

  const cards=week.sessions.map((s,i)=>{
    const uid=`${weekNum}-${i}`, isToday=s.date===t, isPast=s.date<t;
    const st=STYPES[s.type]||STYPES.REPOS;
    const stravaRun=weekRuns.find(r=>r.start_date_local?.slice(0,10)===s.date);
    const effortLaps=stravaRun?getEffortLaps(stravaRun):[];

    const card=el("div",{style:{background:isToday?"#232738":"#1a1d27",border:`1px solid ${isToday?"#f9731644":"#2e3347"}`,borderLeft:`3px solid ${st.color}`,borderRadius:"10px",padding:"12px 14px",marginBottom:"8px"}},
      el("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px"}},
        el("div",{style:{color:isPast?"#475569":"#94a3b8",fontSize:"11px",fontWeight:"700",minWidth:"60px"}},s.day+" "+s.date.slice(8)),
        isToday?el("span",{style:{background:"#f9731633",color:"#f97316",fontSize:"11px",fontWeight:"700",padding:"1px 5px",borderRadius:"3px"}},"AUJOURD'HUI"):null,
        badge(s.type)
      ),
      el("div",{style:{color:"#f1f5f9",fontSize:"14px",fontWeight:"600",marginBottom:"4px"}},s.session),
      (s.warmup||s.cooldown)?el("div",{style:{display:"flex",gap:"12px",marginBottom:"6px",flexWrap:"wrap"}},
        s.warmup?el("div",{class:"muted",style:{fontSize:"11px"}},"▶ "+s.warmup):null,
        s.cooldown?el("div",{class:"muted",style:{fontSize:"11px"}},"◀ "+s.cooldown):null
      ):null,
      s.notes?el("div",{style:{color:"#60a5facc",fontSize:"12px",marginBottom:"8px",fontStyle:"italic"}},"💡 "+s.notes):null,
      stravaRun?el("div",{style:{background:"#fc4c0211",border:"1px solid #fc4c0233",borderRadius:"8px",padding:"8px 10px",marginBottom:"8px"}},
        el("div",{style:{display:"flex",gap:"16px",flexWrap:"wrap",marginBottom:effortLaps.length>0?"8px":"0"}},
          el("div",{},el("div",{style:{color:"#fc4c02",fontSize:"13px",fontWeight:"700"}},(stravaRun.distance/1000).toFixed(2)+"km"),el("div",{class:"muted",style:{fontSize:"12px"}},"distance")),
          el("div",{},el("div",{style:{color:"#fc4c02",fontSize:"13px",fontWeight:"700"}},fmtTime(stravaRun.moving_time)),el("div",{class:"muted",style:{fontSize:"12px"}},"durée")),
          el("div",{},el("div",{style:{color:"#fc4c02",fontSize:"13px",fontWeight:"700"}},fmtPace(stravaRun.average_speed)+"/km"),el("div",{class:"muted",style:{fontSize:"12px"}},"allure moy.")),
          stravaRun.average_heartrate?el("div",{},el("div",{style:{color:"#fc4c02",fontSize:"13px",fontWeight:"700"}},Math.round(stravaRun.average_heartrate)+" bpm"),el("div",{class:"muted",style:{fontSize:"12px"}},"FC moy.")):null
        ),
        effortLaps.length>0?el("div",{style:{borderTop:"1px solid #fc4c0222",paddingTop:"8px"}},
          el("div",{class:"muted",style:{fontSize:"12px",marginBottom:"6px",textTransform:"uppercase",letterSpacing:"0.5px"}},"Intervalles d'effort ("+effortLaps.length+")"),
          ...effortLaps.map((lap,i)=>el("div",{style:{display:"flex",gap:"12px",marginBottom:"4px",alignItems:"center"}},
            el("span",{style:{color:"#64748b",fontSize:"12px",minWidth:"16px"}},""+(i+1)),
            el("span",{style:{color:"#f1f5f9",fontSize:"12px",fontWeight:"600"}},fmtPace(lap.average_speed)+"/km"),
            el("span",{class:"muted",style:{fontSize:"11px"}},(lap.distance/1000).toFixed(2)+"km"),
            lap.average_heartrate?el("span",{class:"muted",style:{fontSize:"11px"}},Math.round(lap.average_heartrate)+" bpm"):null
          ))
        ):null
      ):null
    );

    if (s.type==="RACE") {
      card.appendChild(el("div",{style:{background:"#f9731622",border:"1px solid #f9731644",borderRadius:"8px",padding:"10px 12px",marginTop:"4px"}},
        el("div",{style:{color:"#f97316",fontWeight:"700",fontSize:"14px"}},"🏁 Jour J — Objectif 48'30\""),
        el("div",{class:"text2",style:{fontSize:"12px",marginTop:"4px"}},"Km 1-3 : prudent · Km 4-7 : contrôle · Km 8-10 : tout donner !")
      ));
    } else if (s.type!=="REPOS") {
      const statusRow=el("div",{style:{display:"flex",gap:"6px",flexWrap:"wrap",marginTop:"4px"}});
      SOPTS.forEach(opt=>{
        const cur=statuses[uid]||"—";
        const b=el("button",{style:{background:cur===opt?SCOLORS[opt]+"33":"#232738",border:`1px solid ${cur===opt?SCOLORS[opt]:"#2e3347"}`,borderRadius:"6px",padding:"5px 10px",cursor:"pointer",color:cur===opt?SCOLORS[opt]:"#475569",fontSize:"13px",fontWeight:cur===opt?"700":"400"}},opt==="—"?"–":opt);
        b.addEventListener("click",()=>{ statuses[uid]=opt; save("lk_statuses",statuses); scheduleSave(); render(); });
        statusRow.appendChild(b);
      });
      card.appendChild(statusRow);
    }
    return card;
  });

  return el("div",{style:{padding:"0 16px 100px"}},
    el("div",{style:{display:"flex",alignItems:"center",gap:"12px",marginTop:"8px",marginBottom:"16px"}},
      el("div",{style:{flex:"1"}},
        el("div",{class:"muted",style:{fontSize:"11px",textTransform:"uppercase",letterSpacing:"1px"}},phaseOf(weekNum).label),
        el("div",{style:{color:"#f1f5f9",fontSize:"20px",fontWeight:"800"}},"Semaine "+weekNum),

      ),

        el("div",{style:{color:"#fc4c02",fontSize:"14px",fontWeight:"700"}},weekRuns.length+""),
        el("div",{class:"muted",style:{fontSize:"12px"}},"Strava")
      ):null
    ),
    ...cards
  );
}

function renderNotes() {
  const input=el("input",{type:"text",placeholder:"Ressentis, douleurs, météo..."});
  const addBtn=el("button",{style:{background:"#f97316",border:"none",borderRadius:"10px",color:"#fff",padding:"0 18px",fontSize:"20px",cursor:"pointer",fontWeight:"700",height:"44px",flexShrink:"0"}},"＋");
  addBtn.addEventListener("click",()=>{
    const txt=input.value.trim(); if(!txt) return;
    notesList.unshift({text:txt,date:today(),id:Date.now()});
    save("lk_notes",notesList); scheduleSave(); input.value=""; render();
  });
  input.addEventListener("keydown",e=>{ if(e.key==="Enter") addBtn.click(); });
  return el("div",{style:{padding:"0 16px 100px"}},
    el("div",{style:{marginTop:"8px",marginBottom:"16px"}},
      el("div",{class:"label"},"Carnet de bord"),
      el("div",{style:{display:"flex",gap:"8px"}},input,addBtn)

    notesList.length===0
      ?el("div",{class:"muted",style:{textAlign:"center",padding:"40px 0",fontSize:"14px"}},"Aucune note pour l'instant.",el("span",{style:{fontSize:"28px",display:"block",marginTop:"8px"}},"📝"))
      :el("div",{},...notesList.map(note=>{
          const del=el("button",{style:{background:"none",border:"none",color:"#64748b",fontSize:"18px",cursor:"pointer",padding:"0 4px",alignSelf:"flex-start"}},"×");
          del.addEventListener("click",()=>{ notesList=notesList.filter(n=>n.id!==note.id); save("lk_notes",notesList); scheduleSave(); render(); });

            del
          );
        }))
  );
}

            null
          ),
          el("div",{style:{color:"#94a3b8",fontSize:"12px",marginTop:"3px"}},"• Riegel sur laps SPEC/VMA (3 sources pondérées)"),el("div",{style:{color:"#94a3b8",fontSize:"12px",marginTop:"3px"}},"• Fetch des laps Strava sur séances intervalles"),el("div",{style:{color:"#94a3b8",fontSize:"12px",marginTop:"3px"}},"• Onglet Paramètres")
        ),
el("div",{style:{padding:"10px",background:"transparent",border:"none",borderRadius:"8px",marginBottom:"8px"}},
          el("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}},
            el("span",{style:{color:"#64748b",fontSize:"13px",fontWeight:"700"}},"v1.1"),
            el("span",{style:{color:"#f1f5f9",fontSize:"13px",fontWeight:"600"}},"Strava & Cloud"),
            null
          ),
          el("div",{style:{color:"#94a3b8",fontSize:"12px",marginTop:"3px"}},"• Connexion Strava OAuth"),el("div",{style:{color:"#94a3b8",fontSize:"12px",marginTop:"3px"}},"• Sync automatique des activités"),el("div",{style:{color:"#94a3b8",fontSize:"12px",marginTop:"3px"}},"• Sauvegarde GitHub Gist")
        ),
el("div",{style:{padding:"10px",background:"transparent",border:"none",borderRadius:"8px",marginBottom:"0"}},
          el("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}},
            el("span",{style:{color:"#64748b",fontSize:"13px",fontWeight:"700"}},"v1.0"),
            el("span",{style:{color:"#f1f5f9",fontSize:"13px",fontWeight:"600"}},"Lancement"),
            null
          ),
          el("div",{style:{color:"#94a3b8",fontSize:"12px",marginTop:"3px"}},"• Plan 11 semaines · 3 phases"),el("div",{style:{color:"#94a3b8",fontSize:"12px",marginTop:"3px"}},"• Suivi des séances (✅❌⚠️😴)"),el("div",{style:{color:"#94a3b8",fontSize:"12px",marginTop:"3px"}},"• Carnet de bord")
        ),
)
  );

  const infoSection=el("div",{},
    el("div",{class:"label"},"Informations"),
    el("div",{class:"card"},
      ...[
        ["Objectif","48'30\" · 4:51/km","#f97316"],
        ["Course","6 septembre 2026","#f1f5f9"],
        ["Référence","50'21\" (Lavandou)","#f1f5f9"],
        ["Allure EF","6:20/km","#60a5fa"],
        ["Prédicteur","Riegel + laps Strava v2","#f1f5f9"],
      ].map(([label,val,color])=>el("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"6px"}},
        el("span",{class:"muted",style:{fontSize:"12px"}},label),
        el("span",{style:{color,fontSize:"12px",fontWeight:color==="#f1f5f9"?"400":"700"}},val)
      ))
    )
  );

  return el("div",{style:{padding:"0 16px 100px"}},
    el("div",{style:{marginTop:"8px",marginBottom:"20px"}}),
    cloudSection, stravaSection, versionSection, infoSection
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════════════════════
function setView(v) { view=v; render(); window.scrollTo(0,0); }

function render() {
  const app=document.getElementById("app");
  app.innerHTML="";

  const backBtn=view==="weekDetail"
    ?el("button",{style:{background:"none",border:"none",color:"#f97316",fontSize:"22px",cursor:"pointer",padding:"0",lineHeight:"1",marginRight:"4px"},onClick:()=>setView("weeks")},"‹")
    :null;

  const titles={dashboard:"Plan 10K",weeks:"Semaines",weekDetail:"Semaine "+selectedWeek,notes:"Carnet de bord",settings:"Paramètres"};
  const hdr=el("div",{style:{position:"sticky",top:"0",zIndex:"10",background:"rgba(15,17,23,0.95)",backdropFilter:"blur(12px)",borderBottom:"1px solid #2e3347",padding:"12px 16px 10px",display:"flex",alignItems:"center",gap:"6px"}},
    backBtn||"",
    el("div",{style:{flex:"1"}},
      el("div",{style:{color:"#f1f5f9",fontSize:"17px",fontWeight:"700",lineHeight:"1"}},titles[view]||""),
      view==="weekDetail"?el("div",{class:"muted",style:{fontSize:"11px",marginTop:"1px"}},phaseOf(selectedWeek).label):null
    ),
    el("div",{style:{background:"#232738",borderRadius:"8px",padding:"4px 10px",color:"#f97316",fontSize:"13px",fontWeight:"700"}},"J–"+countdown())
  );

  let content;
  if (view==="dashboard") content=renderDashboard();
  else if (view==="weeks") content=renderWeeks();
  else if (view==="weekDetail") content=renderWeekDetail(selectedWeek);
  else if (view==="notes") content=renderNotes();
  else content=renderSettings();

  const NAV=[
    {id:"dashboard",icon:"⚡",label:"Dashboard"},
    {id:"weeks",    icon:"📅",label:"Semaines"},
    {id:"notes",    icon:"📝",label:"Notes"},
    {id:"settings", icon:"⚙️",label:"Paramètres"},
  ];
  const activeNav=["dashboard","notes","settings"].includes(view)?view:"weeks";
  const nav=el("div",{style:{position:"fixed",bottom:"0",left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"430px",background:"rgba(26,29,39,0.97)",backdropFilter:"blur(16px)",borderTop:"1px solid #2e3347",display:"flex",zIndex:"20"}},
    ...NAV.map(n=>{
      const b=el("button",{style:{flex:"1",background:"none",border:"none",cursor:"pointer",padding:"10px 0 14px",display:"flex",flexDirection:"column",alignItems:"center",gap:"3px",opacity:activeNav===n.id?"1":"0.45"}},
        el("span",{style:{fontSize:"20px"}},n.icon),
        el("span",{style:{fontSize:"12px",fontWeight:"700",letterSpacing:"0.3px",color:activeNav===n.id?"#f97316":"#64748b"}},n.label)
      );
      b.addEventListener("click",()=>{ if(n.id==="weeks") selectedWeek=currentWeek(); setView(n.id); });
      return b;
    })
  );

  app.appendChild(hdr);
  app.appendChild(content);
  app.appendChild(nav);
}

render();

if ('serviceWorker' in navigator) {
  window.addEventListener('load',()=>{ navigator.serviceWorker.register('/sw.js').catch(()=>{}); });
}
</script>
